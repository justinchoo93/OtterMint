services:
  db:
    image: postgres:17
    container_name: ottermint-db-1
    restart: unless-stopped
    environment:
      POSTGRES_DB: ottermint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?set POSTGRES_SUPERUSER_PASSWORD in .env}
      TZ: America/Los_Angeles
    volumes:
      # Portable named volume by default. Environment-specific deployments (e.g. a
      # NAS) override this with a bind mount to their own storage in a local compose.
      - ottermint-pgdata:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ottermint"]
      interval: 30s
      timeout: 5s
      retries: 5
    # NO ports: section — the DB is never published to the host.

  ottermint:
    build: .
    image: ottermint:latest
    container_name: ottermint-app-1
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Next's standalone server binds to $HOSTNAME; Docker sets it to the container
      # id, so bind all interfaces or the localhost healthcheck below is refused.
      HOSTNAME: "0.0.0.0"
      TZ: America/Los_Angeles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - proxy_net
    healthcheck:
      # 127.0.0.1, not localhost: inside the container localhost resolves to ::1
      # (IPv6) but the app listens on 0.0.0.0 (IPv4), so localhost is refused.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    # NO ports: section — Caddy reaches it via proxy_net Docker DNS (ottermint:3000).

networks:
  default: {}
  proxy_net:
    external: true

volumes:
  ottermint-pgdata: {}
